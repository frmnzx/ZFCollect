        if (role === 'admin') {

            return null;
        }
        const uname = identifier.trim();

        const db = window.__db;
        if (!db) {
            // Fallback localStorage
            const existing = users.find(u => u.username === uname);
            if (existing) {
                if (existing.password !== pwd) return 'Password salah';
            } else {
                setUsers(prev => [...prev, { username: uname, password: pwd, createdAt: Date.now(), wishlist: [], history: [] }]);
            }
            setCurrentUser({ role: 'user', username: uname });
            return null;

            if (snap.exists) {

                if (data.password !== pwd) return 'Password salah';

                // Daftar user baru ke Firestore
                await docRef.set({
                    username: uname,
                    password: pwd,
                    createdAt: Date.now(),
