                {isMenuOpen && (
                  <div
                    className="card-admin-menu"
                    style={{ top: 36, right: 0, bottom: 'auto', position: 'absolute' }}
                    onClick={e => e.stopPropagation()}
                  >
                    {/* Tombol Share */}
                    <button onClick={() => {
                      const url = item.url && item.url !== '#' ? item.url : window.location.href;
                      if (navigator.share) { navigator.share({ title: item.name, url }); }
                      else { navigator.clipboard?.writeText(url).catch(() => {}); alert('Link disalin!'); }
                      setMenuOpen(false);
                    }}>
                      <i className="fas fa-share-nodes" /> Share
                    </button>
                    {/* Tombol Download */}
                    <button onClick={() => { window.open(item.url, '_blank'); setMenuOpen(false); }}>
                      <i className="fas fa-download" /> Download
                    </button>
                    {/* Tombol Edit & Hapus (hanya Admin) */}
                    {isAdmin && (
                      <>
                        <button onClick={() => { onEdit(item); setMenuOpen(false); }}>
                          <i className="fas fa-pen" /> Edit
                        </button>
                        <button onClick={() => { onDelete(item.id); setMenuOpen(false); }}>
                          <i className="fas fa-trash" /> Hapus
                        </button>
                      </>
                    )}
                  </div>
                )}
              </div>
            </div>
          </div>

          {/* Tombol share di sudut kanan atas kartu */}
          <button
            className="card-three-dot"
            onClick={e => {
              e.stopPropagation();
              const url = item.url && item.url !== '#' ? item.url : window.location.href;
              if (navigator.share) {
                navigator.share({ title: item.name, url });
              } else {
                navigator.clipboard?.writeText(url).catch(() => {});
                alert('Link disalin!');
              }
            }}
          >
            <i className="fas fa-share-nodes" />
          </button>

          {/* Menu admin floating (posisi dari ref tombol) */}
          {isAdmin && isMenuOpen && (
            <div
              className="card-admin-menu"
              style={{ position: 'fixed', zIndex: 9999 }}
              ref={el => {
                if (el && menuRef.current) {
                  const rect    = menuRef.current.getBoundingClientRect();
                  el.style.top  = rect.bottom + 4 + 'px';
                  el.style.left = rect.left - el.offsetWidth + rect.width + 'px';
                }
              }}
              onClick={e => e.stopPropagation()}
            >
              <button onClick={() => { onEdit(item); setMenuOpen(false); }}>
                <i className="fas fa-pen" /> Edit
              </button>
              <button onClick={() => { onDelete(item.id); setMenuOpen(false); }}>
                <i className="fas fa-trash" /> Hapus
              </button>
            </div>
          )}
        </div>
      );
    });

    // ============================================================
    //  HOME SCREEN
    //  Halaman utama: search, filter, dan daftar semua konten
    // ============================================================

    function HomeScreen() {
      const { content, isAdmin, deleteContent, updateContent, setPopup } = useApp();
      const [search,      setSearch]      = useState('');
      const [filter,      setFilter]      = useState('ALL');
      const [editingItem, setEditingItem] = useState(null);
      const [openMenuId,  setOpenMenuId]  = useState(null);
      const scrollRef = useRef();

      // Tutup menu dropdown saat halaman di-scroll
      useEffect(() => {
        const el = document.querySelector('.page-content');
        if (!el) return;
        const handler = () => setOpenMenuId(null);
        el.addEventListener('scroll', handler, { passive: true });
        return () => el.removeEventListener('scroll', handler);
      }, []);

      // Tutup menu dropdown saat klik di luar area menu
      useEffect(() => {
        if (!openMenuId) return;
        const handler = () => setOpenMenuId(null);
        document.addEventListener('click', handler);
        return () => document.removeEventListener('click', handler);
      }, [openMenuId]);

      // Filter dan cari konten berdasarkan tipe & teks search
      const filtered = useMemo(() => {
        return content.filter(c => {
          const matchType   = filter === 'ALL' || c.type === filter;
          const matchSearch = !search.trim() ||
            (c.name     || '').toLowerCase().includes(search.toLowerCase()) ||
            (c.category || '').toLowerCase().includes(search.toLowerCase());
          return matchType && matchSearch;
        });
      }, [content, search, filter]);

      const handleOpen   = useCallback((item) => {
        if (item.url && item.url !== '#') window.open(item.url, '_blank');
      }, []);
      const handleDelete = useCallback((id) => deleteContent(id), [deleteContent]);
      const handleEdit   = useCallback((i)  => setEditingItem(i), []);

      const filterTabs = ['ALL', ...TYPES];

      return (
        <div className="screen">
          {/* Header sticky: logo + tombol refresh */}
          <div className="home-header">
            <div className="brand-row">
              <div className="brand-logo-box">
                <i className="fas fa-link" />
              </div>
              <span className="brand-title">ZF Collection Templates</span>
            </div>
            <button
              className="icon-btn"
              title="Refresh"
              onClick={e => {
                const icon = e.currentTarget.querySelector('i');
                e.currentTarget.style.transform = 'scale(0.8)';
                e.currentTarget.style.transition = 'transform 0.15s ease';
                icon.style.transition = 'transform 0.4s ease';
                icon.style.transform  = 'rotate(360deg)';
                setTimeout(() => window.location.reload(), 400);
              }}
            >
              <i className="fas fa-arrows-rotate" />
            </button>
          </div>

          {/* Search bar */}
          <div className="search-wrap">
            <div className="search-bar">
              <i className="fas fa-magnifying-glass" />
              <input
                type="text"
                placeholder="Search..."
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
              {search && (
                <button className="search-clear" onClick={() => setSearch('')}>
                  <i className="fas fa-times" />
                </button>
              )}
            </div>
          </div>

          {/* Chip filter tipe konten */}
          <div className="filter-row">
            {filterTabs.map(t => {
              const isActive = filter === t;
              const color    = t === 'ALL' ? '#fff' : (TYPE_COLORS[t] || '#fff');
              return (
                <button
                  key={t}
                  className={`filter-chip${isActive ? ' active' : ''}`}
                  style={isActive ? { borderColor: color, color } : {}}
                  onClick={() => setFilter(t)}
                >
                  {t === 'unknow' ? '???' : t}
                </button>
              );
            })}
          </div>

          {/* Daftar konten / state kosong */}
          {filtered.length === 0
            ? (
              <div className="empty-state">
                <i className="fas fa-folder-open" />
                <p>Tidak ada konten ditemukan</p>
              </div>
            )
            : (
              <div className="content-grid" ref={scrollRef}>
                {filtered.map((item, idx) => (
                  <ContentCard
                    key={item.id}
                    item={item}
                    isAdmin={isAdmin}
                    onOpen={() => handleOpen(item)}
                    onDelete={handleDelete}
                    onEdit={handleEdit}
                    isMenuOpen={openMenuId === item.id}
                    setOpenMenuId={setOpenMenuId}
                    style={{ animationDelay: `${idx * 30}ms` }}
                  />
                ))}
              </div>
            )
          }

          {/* Modal edit konten (muncul jika admin klik Edit) */}
          {editingItem && (
            <EditModal
              item={editingItem}
              onClose={() => setEditingItem(null)}
              onSave={(id, updates) => { updateContent(id, updates); setEditingItem(null); }}
            />
          )}
        </div>
      );
    }

    // ============================================================
    //  CONTENT POPUP
    //  Bottom sheet detail konten: thumbnail, info, download, share
    // ============================================================

    function ContentPopup() {
      const { popup, setPopup, content, isWishlisted, toggleWishlist, currentUser, adminProfile } = useApp();
      const [shareOpen, setShareOpen] = useState(false);

      if (!popup) return null;
      const item = content.find(c => c.id === popup);
      if (!item)  return null;

      const loved = isWishlisted(popup);

      // Fungsi share ke berbagai platform
      function handleShare(platform) {
        const url  = item.url === '#' ? window.location.href : item.url;
        const text = `Cek "${item.name}" di ZF Collection Templates`;
        const urls = {
          copy      : null,
          whatsapp  : `https://wa.me/?text=${encodeURIComponent(text + '\n' + url)}`,
          telegram  : `https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`,
          discord   : `https://discord.com/channels/@me`,
          instagram : null,
        };
        if (platform === 'copy' || platform === 'instagram') {
          navigator.clipboard?.writeText(url).catch(() => {});
          alert('Link disalin ke clipboard!');
        } else {
          window.open(urls[platform], '_blank');
        }
        setShareOpen(false);
      }

      return (
        <div className="popup-overlay" onClick={() => { setPopup(null); setShareOpen(false); }}>
          <div className="popup-sheet" onClick={e => e.stopPropagation()}>
            {/* Thumbnail besar */}
            <div className="popup-thumb" style={{ background: item.gradient || '#1a1a1a' }}>
              {item.thumbnail
                ? <img src={item.thumbnail} alt={item.name} />
                : <div className="thumb-placeholder"><i className="fas fa-image" style={{ fontSize: 40 }} /></div>
              }
              {/* Tombol love (hanya untuk user, bukan admin) */}
              {currentUser && currentUser.role !== 'admin' && (
                <button
                  className={`popup-love-btn${loved ? ' loved' : ''}`}
                  onClick={() => toggleWishlist(popup)}
                >
                  <i className={`${loved ? 'fas' : 'far'} fa-heart`} />
                </button>
              )}
              {/* Tombol tutup popup */}
              <button className="popup-close-btn" onClick={() => setPopup(null)}>
                <i className="fas fa-times" />
              </button>
            </div>

            {/* Isi teks popup */}
            <div className="popup-body">
              {/* Judul + badge tipe konten */}
              <div className="popup-title-row">
                <span className="popup-name">{item.name}</span>
                <span className="popup-type" style={{ color: TYPE_COLORS[item.type] }}>{item.type}</span>
              </div>

              {/* Deskripsi konten */}
              {item.description && <p className="popup-desc">{item.description}</p>}

              {/* Baris info uploader + tombol sosial media */}
              <div className="popup-uploader-row">
                <div className="popup-uploader">
                  <i className="fas fa-circle-user" />
                  <span>@{item.uploaderUsername || 'admin'}</span>
                </div>
                {(() => {
                  const social = item.uploaderSocial;
                  const href   = getSocialUrl(social);
                  const plat   = social?.platform ? SOCIAL_PLATFORMS.find(p => p.key === social.platform) : null;
                  if (!href || !plat) return null;
                  return (
                    <a
                      href={href}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="popup-yt-btn"
                      title={plat.key}
                      style={{ color: plat.color }}
                    >
                      <i className={plat.icon} />
                    </a>
                  );
                })()}
              </div>

              {/* Tombol Download + Share */}
              <div className="popup-action-row">
                <a
                  href={item.url}
                  target="_blank"
                  className="btn-dl"
                  download
                  onClick={e => item.url === '#' && e.preventDefault()}
                >
                  <i className="fas fa-download" /> Download
                </a>

                <div className="share-wrap">
                  <button className="btn-share" onClick={() => setShareOpen(p => !p)}>
                    <i className="fas fa-share-nodes" />
                  </button>
                  {/* Dropdown pilihan platform share */}
                  {shareOpen && (
                    <div className="share-dropdown">
                      <button onClick={() => handleShare('copy')}>
                        <i className="fas fa-link" /> Salin Link
                      </button>
                      <button onClick={() => handleShare('whatsapp')}>
                        <i className="fab fa-whatsapp" style={{ color: '#25d366' }} /> WhatsApp
                      </button>
                      <button onClick={() => handleShare('telegram')}>
                        <i className="fab fa-telegram" style={{ color: '#2ca5e0' }} /> Telegram
                      </button>
                      <button onClick={() => handleShare('instagram')}>
                        <i className="fab fa-instagram" style={{ color: '#e1306c' }} /> Instagram
                      </button>
                      <button onClick={() => handleShare('discord')}>
                        <i className="fab fa-discord" style={{ color: '#7289da' }} /> Discord
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    //  FAQ SECTION
    //  Komponen akordion FAQ di bagian bawah halaman Profil
    // ============================================================

    const FAQ_ITEMS = [
      { q: 'Apa itu ZF Collection?',            a: 'ZF Collection adalah platform untuk mengumpulkan dan berbagi template model 3D, animasi, world, dan render.' },
      { q: 'Bagaimana cara mengunduh konten?',   a: 'Pilih konten lalu tekan tombol Unduh. Kamu akan diarahkan ke link download yang sudah disediakan.' },
      { q: 'Bagaimana jika link terhapus?',                     a: 'Hubungi Admin lewat media sosial yang tersedia di profil.' },
      { q: 'Bagaimana cara menyimpan konten?',   a: 'Login terlebih dahulu, lalu tekan ikon hati ♥ pada konten yang ingin kamu simpan ke Wishlist.' },
      { q: 'Siapa yang bisa mengupload konten?', a: 'Hanya Admin yang bisa mengupload konten. Hubungi Admin jika ingin menambahkan kontenmu.' },
    ];

    function FaqItem({ q, a, open, onToggle }) {
      return (
        <div className="faq-item">
          <button className="faq-question" onClick={onToggle}>
            <span>{q}</span>
            <i className={`fas fa-chevron-${open ? 'up' : 'down'}`} style={{ fontSize: 12, color: 'var(--text-muted)', flexShrink: 0, marginLeft: 8 }} />
          </button>
          {open && <p className="faq-answer">{a}</p>}
        </div>
      );
}

    function FaqSection() {
      const [openIdx, setOpenIdx] = useState(null);
      return (
        <div className="faq-wrap">
          <p className="faq-title">FAQ</p>
          {FAQ_ITEMS.map((item, i) => (
            <FaqItem
              key={i}
              {...item}
              open={openIdx === i}
              onToggle={() => setOpenIdx(openIdx === i ? null : i)}
            />
          ))}
        </div>
      );
    }

    // ============================================================
    //  PROFILE SCREEN
    //  Halaman profil: info kreator + edit (Admin) + logout
    // ============================================================

    function ProfileScreen() {
      const { adminProfile, updateAdminProfile, isAdmin, logout, currentUser } = useApp();
      const [editMode, setEditMode] = useState(false);
      const [form,     setForm]     = useState({ ...adminProfile });
      const fileRef                 = useRef();

      // Handle upload foto profil admin (dengan kompresi gambar)
      function handlePhotoUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX    = 720;
            let w = img.width, h = img.height;
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
            canvas.width  = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const compressed = canvas.toDataURL('image/jpeg', 0.7);
            setForm(f => ({ ...f, photo: compressed }));
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }

      function handleSave() {
        updateAdminProfile(form);
        setEditMode(false);
      }

      function handleCancel() {
        setForm({ ...adminProfile });
        setEditMode(false);
      }

      return (
        <div className="screen">
          <h1 className="screen-title">PROFIL</h1>

          {/* Kartu profil utama */}
          <div className="profile-card">
            {/* Badge peran */}
            {isAdmin  && <span className="profile-role-badge">Admin</span>}
            {!isAdmin && <span className="profile-role-badge">Info Kreator</span>}

            {/* Foto profil */}
            <div
              className="profile-avatar"
              onClick={() => isAdmin && editMode && fileRef.current?.click()}
            >
              {adminProfile.photo
                ? <img src={adminProfile.photo} alt="Profile" />
                : <i className="fas fa-circle-user" />
              }
              {/* Overlay kamera saat mode edit */}
              {isAdmin && editMode && (
                <div className="avatar-cam-overlay"><i className="fas fa-camera" /></div>
              )}
            </div>
            {/* Input file foto (tersembunyi) */}
            {isAdmin && (
              <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handlePhotoUpload} />
            )}

            {/* Nama & bio: tampilan biasa atau form edit */}
            {editMode ? (
              <>
                <input
                  className="edit-field"
                  value={form.name}
                  placeholder="Nama"
                  onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                  style={{ textAlign: 'center', marginBottom: 4 }}
                />
                <input
                  className="edit-field"
                  value={form.bio}
                  placeholder="Bio / Deskripsi"
                  onChange={e => setForm(f => ({ ...f, bio: e.target.value }))}
                  style={{ textAlign: 'center' }}
                />
              </>
            ) : (
              <>
                <p className="profile-name-text">{adminProfile.name}</p>
                <p className="profile-bio-text">{adminProfile.bio}</p>
              </>
            )}

            <div className="profile-divider" />

            {/* Baris ikon sosial media */}
            <div className="social-row">
              <a href={adminProfile.tiktok}    target="_blank" className="social-icon-btn" title="TikTok">
                <i className="fab fa-tiktok" />
              </a>
              <a href={adminProfile.youtube}   target="_blank" className="social-icon-btn" title="YouTube">
                <i className="fab fa-youtube" style={{ color: '#ff0000' }} />
              </a>
              <a href={adminProfile.instagram} target="_blank" className="social-icon-btn" title="Instagram">
                <i className="fab fa-instagram" style={{ color: '#e1306c' }} />
              </a>
              <button className="social-icon-btn" title="Saweria (Donasi)"
                onClick={() => window.open(adminProfile.saweria, '_blank')}>
                ☕
              </button>
            </div>

            {/* Form edit link sosial media (hanya saat mode edit) */}
            {editMode && (
              <>
                <p className="edit-section-label">Link Sosial Media</p>
                <input
                  className="edit-field"
                  value={form.tiktok}
                  placeholder="TikTok URL"
                  onChange={e => setForm(f => ({ ...f, tiktok: e.target.value }))}
                />
                <input
                  className="edit-field"
                  value={form.youtube}
                  placeholder="YouTube URL"
                  onChange={e => setForm(f => ({ ...f, youtube: e.target.value }))}
                />
                <input
                  className="edit-field"
                  value={form.instagram}
                  placeholder="Instagram URL"
                  onChange={e => setForm(f => ({ ...f, instagram: e.target.value }))}
                />
                <input
                  className="edit-field"
                  value={form.saweria}
                  placeholder="Saweria URL"
                  onChange={e => setForm(f => ({ ...f, saweria: e.target.value }))}
                />
              </>
            )}
          </div>

          {/* Tombol aksi: Edit Profil / Simpan / Batal / Keluar */}
          <div className="profile-actions-wrap">
            {isAdmin && (
              editMode
                ? (
                  <>
                    <button className="action-btn primary"   onClick={handleSave}>Simpan Perubahan</button>
                    <button className="action-btn secondary" onClick={handleCancel}>Batal</button>
                  </>
                )
                : (
                  <button className="action-btn secondary" onClick={() => setEditMode(true)}>
                    <i className="fas fa-pen" /> Edit Profil
                  </button>
                )
            )}
            {currentUser && (
              <button className="action-btn danger" onClick={logout}>
                <i className="fas fa-right-from-bracket" /> Keluar
              </button>
            )}
          </div>

          {/* Bar status login user */}
          {currentUser && !isAdmin && (
            <div className="user-status-bar">
              Login sebagai: <strong>@{currentUser.username}</strong>
            </div>
          )}

          {/* ── FAQ ── */}
          <FaqSection />
        </div>
      );
    }

    // ============================================================
    //  WISHLIST SCREEN
    //  Halaman daftar konten yang disimpan user
    // ============================================================

    function WishlistScreen() {
      const { getWishlistContent, toggleWishlist, setPopup, currentUser, isAdmin } = useApp();
      const [sort,       setSort]       = useState('newest');
      const [selectMode, setSelectMode] = useState(false);
      const [selected,   setSelected]   = useState(new Set());

      // Tampilkan halaman terkunci jika bukan user biasa
      if (!currentUser || isAdmin) {
        return (
          <div className="screen">
            <h1 className="screen-title">WISHLIST</h1>
            <div className="lock-state">
              <i className={`fas ${isAdmin ? 'fa-shield-halved' : 'fa-lock'}`} />
              <p>{isAdmin ? 'Admin tidak memiliki wishlist' : 'Login sebagai User untuk menyimpan wishlist'}</p>
            </div>
          </div>
        );
      }

      const wishlist = getWishlistContent();

      // Sortir wishlist berdasarkan pilihan user
      const sorted = useMemo(() => {
        const arr = [...wishlist];
        if (sort === 'newest')      arr.sort((a, b) => b.uploadedAt - a.uploadedAt);
        else if (sort === 'oldest') arr.sort((a, b) => a.uploadedAt - b.uploadedAt);
        else                        arr.sort((a, b) => a.name.localeCompare(b.name));
        return arr;
      }, [wishlist, sort]);

      const sortLabel  = sort === 'newest' ? 'Terbaru' : sort === 'oldest' ? 'Terlama' : 'A–Z';
      const sortIcon   = sort === 'alpha' ? 'fa-arrow-down-a-z' : sort === 'newest' ? 'fa-arrow-down-short-wide' : 'fa-arrow-up-short-wide';
      const cycleSorts = () => setSort(s => s === 'newest' ? 'oldest' : s === 'oldest' ? 'alpha' : 'newest');

      // Fungsi seleksi item wishlist
      const toggleSel = id => setSelected(prev => {
        const n = new Set(prev);
        n.has(id) ? n.delete(id) : n.add(id);
        return n;
      });
      const selectAll = () =>
        setSelected(selected.size === sorted.length ? new Set() : new Set(sorted.map(i => i.id)));
      const deleteSelected = () => {
        selected.forEach(id => toggleWishlist(id));
        setSelected(new Set());
        setSelectMode(false);
      };

      return (
        <div className="screen">
          {/* Header wishlist: judul + tombol pilih */}
          <div className="wishlist-header-row">
            <h1 className="screen-title">WISHLIST</h1>
            <div className="wishlist-ctrl-row">
              <button
                className={`ctrl-icon-btn${selectMode ? ' on' : ''}`}
                onClick={() => { setSelectMode(p => !p); setSelected(new Set()); }}
                title="Pilih item"
              >
                <i className="fas fa-pencil" />
              </button>
              {selectMode && selected.size > 0 && (
                <button className="ctrl-icon-btn del" onClick={deleteSelected} title="Hapus terpilih">
                  <i className="fas fa-trash" />
                </button>
              )}
            </div>
          </div>

          {/* Baris sortir + pilih semua */}
          <div className="wl-sort-bar">
            <button className="wl-sort-btn" onClick={cycleSorts}>
              <i className={`fas ${sortIcon}`} /> {sortLabel}
            </button>
            {selectMode && (
              <button className="wl-sort-btn" onClick={selectAll}>
                <i className="fas fa-check-double" />
                {selected.size === sorted.length ? 'Batal Semua' : 'Pilih Semua'}
              </button>
            )}
          </div>

          {/* Daftar item wishlist / state kosong */}
          {sorted.length === 0
            ? (
              <div className="empty-state">
                <i className="far fa-heart" />
                <p>Wishlist kosong</p>
              </div>
            )
            : (
              <div className="wl-list">
                {sorted.map(item => (
                  <div
                    key={item.id}
                    className={`wl-item${selectMode && selected.has(item.id) ? ' sel' : ''}`}
                    onClick={() => selectMode ? toggleSel(item.id) : setPopup(item.id)}
                  >
                    {/* Checkbox seleksi */}
                    {selectMode && (
                      <div className={`wl-checkbox${selected.has(item.id) ? ' checked' : ''}`}>
                        {selected.has(item.id) && <i className="fas fa-check" />}
                      </div>
                    )}

                    {/* Thumbnail item wishlist */}
                    <div className="wl-thumb" style={{ background: item.gradient }}>
                      {item.thumbnail && <img src={item.thumbnail} alt="" loading="lazy" decoding="async" />}
                    </div>

                    {/* Info: nama, tipe, tombol download */}
                    <div className="wl-info">
                      <p className="wl-name">{item.name}</p>
                      <span className="wl-type-lbl" style={{ color: TYPE_COLORS[item.type] }}>{item.type}</span>
                      <a
                        href={item.url}
                        target="_blank"
                        className="wl-dl-btn"
                        onClick={e => {
                          e.stopPropagation();
                          if (item.url === '#') { e.preventDefault(); alert('URL demo, tidak tersedia'); }
                        }}
                      >
                        <i className="fas fa-download" /> Download
                      </a>
                    </div>

                    {/* Tombol hapus dari wishlist */}
                    {!selectMode && (
                      <button
                        className="wl-trash-btn"
                        onClick={e => { e.stopPropagation(); toggleWishlist(item.id); }}
                        title="Hapus dari wishlist"
                      >
                        <i className="fas fa-trash" />
                      </button>
                    )}
                  </div>
                ))}
              </div>
            )
          }
        </div>
      );
    }

    // ============================================================
    //  UPLOAD SCREEN (Admin Only)
    //  Halaman upload konten baru — hanya bisa diakses Admin
    // ============================================================

    function UploadScreen() {
      const { isAdmin, addContent, setActiveTab } = useApp();

      // State form upload
      const [form, setForm] = useState({
        name             : '',
        description      : '',
        category         : '',
        url              : '',
        type             : 'Kategori',
        uploaderUsername : '',
        uploaderSocial   : { platform: 'YouTube', username: '' },
      });
      const [thumb,       setThumb]       = useState(null);
      const [thumbData,   setThumbData]   = useState(null);
      const [showTypeDD,  setShowTypeDD]  = useState(false);
      const [showSocialDD,setShowSocialDD]= useState(false);
      const [showCatDD,   setShowCatDD]   = useState(false);
      const [errors,      setErrors]      = useState({});
      const [success,     setSuccess]     = useState(false);
      const fileRef = useRef();

      // Tampilan terkunci jika bukan admin
      if (!isAdmin) {
        return (
          <div className="screen">
            <div className="lock-state">
              <i className="fas fa-lock" />
              <p>Hanya Admin yang bisa upload konten</p>
            </div>
          </div>
        );
      }

      // Handle upload thumbnail (dengan kompresi gambar)
      function handleThumb(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX    = 720;
            let w = img.width, h = img.height;
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
            canvas.width  = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const compressed = canvas.toDataURL('image/jpeg', 0.7);
            setThumb(compressed);
            setThumbData(compressed);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }

      // Validasi field wajib sebelum submit
      function validate() {
        const errs = {};
        if (!form.name.trim()) errs.name = 'Nama wajib diisi';
        if (!form.url.trim())  errs.url  = 'URL wajib diisi';
        setErrors(errs);
        return !Object.keys(errs).length;
      }

      // Submit form upload konten baru
      function handleSubmit() {
        if (!validate()) return;
        addContent({ ...form, thumbnail: thumbData });
        setForm({
          name             : '',
          description      : '',
          category         : '',
          url              : '',
          type             : 'Model 3D',
          uploaderUsername : '',
          uploaderSocial   : { platform: 'YouTube', username: '' },
        });
        setThumb(null);
        setThumbData(null);
        setSuccess(true);
        setTimeout(() => { setSuccess(false); setActiveTab('home'); }, 1600);
      }

      return (
        <div className="screen">
          <h1 className="screen-title">UPLOAD</h1>

          {/* Toast sukses setelah upload berhasil */}
          {success && (
            <div className="toast-success">
              <i className="fas fa-circle-check" /> Konten berhasil diupload!
            </div>
          )}

          <div className="upload-card">
            {/* Preview thumbnail (standalone, tanpa tombol samping) */}
            <div className="upload-preview-box" onClick={() => fileRef.current?.click()}>
              {thumb
                ? <img src={thumb} alt="Preview" />
                : <><i className="fas fa-cloud-arrow-down" /><span>Picture</span></>
              }
            </div>
            <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleThumb} />

            {/* Field Nama */}
            <input
              className={`upload-input${errors.name ? ' err' : ''}`}
              placeholder="Nama"
              value={form.name}
              onChange={e => { setForm(f => ({ ...f, name: e.target.value })); setErrors(p => ({ ...p, name: '' })); }}
            />
            {errors.name && <p className="field-err">{errors.name}</p>}

            {/* Field Deskripsi */}
            <input
              className="upload-input"
              placeholder="Deskripsi"
              value={form.description}
              onChange={e => setForm(f => ({ ...f, description: e.target.value }))}
            />

            {/* Field URL Download */}
            <input
              className={`upload-input${errors.url ? ' err' : ''}`}
              placeholder="URL Download"
              value={form.url}
              onChange={e => { setForm(f => ({ ...f, url: e.target.value })); setErrors(p => ({ ...p, url: '' })); }}
            />
            {errors.url && <p className="field-err">{errors.url}</p>}

            {/* Baris selector Tipe & Label/Kategori */}
            <div style={{ display: 'flex', gap: 8 }}>
              {/* Dropdown Tipe Konten */}
              <div className="type-selector" style={{ flex: 1 }}>
                <button className="type-selector-btn" onClick={() => setShowTypeDD(p => !p)}>
                  <span style={{ color: TYPE_COLORS[form.type] }}>{form.type}</span>
                  <i className={`fas fa-chevron-${showTypeDD ? 'up' : 'down'}`} />
                </button>
                {showTypeDD && (
                  <div className="type-dropdown">
                    {TYPES.map(t => (
                      <button
                        key={t}
                        className={`type-opt${form.type === t ? ' sel' : ''}`}
                        style={{ color: TYPE_COLORS[t] }}
                        onClick={() => { setForm(f => ({ ...f, type: t })); setShowTypeDD(false); }}
                      >
                        {t}
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Dropdown Label/Kategori Konten */}
              <div className="type-selector" style={{ flex: 1 }}>
                <button className="type-selector-btn" onClick={() => setShowCatDD(p => !p)}>
                  <span style={{ color: '#ffffff' }}>{form.category || 'Label'}</span>
                  <i className={`fas fa-chevron-${showCatDD ? 'up' : 'down'}`} />
                </button>
                {showCatDD && (
                  <div className="type-dropdown">
                    {CATEGORIES.map(c => (
                      <button
                        key={c}
                        className={`type-opt${form.category === c ? ' sel' : ''}`}
                        style={{ color: CATEGORY_COLORS[c] || '#ffffff' }}
                        onClick={() => { setForm(f => ({ ...f, category: c })); setShowCatDD(false); }}
                      >
                        {c}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* Tombol Upload & Batal — tepat di bawah selector Tipe */}
            <div className="upload-side-btns" style={{ flexDirection: 'row' }}>
              <button className="upload-side-btn confirm" style={{ flex: 1, justifyContent: 'center' }} onClick={() => fileRef.current?.click()}>
                <i className="fas fa-upload" /> Upload
              </button>
              <button className="upload-side-btn cancel" style={{ flex: 1, justifyContent: 'center' }} onClick={() => { setThumb(null); setThumbData(null); }}>
                Batal <i className="fas fa-times" />
              </button>
            </div>

            {/* Garis pemisah "Info Uploader" */}
            <div className="upload-section-divider">
              <span>Info Uploader</span>
            </div>

            {/* Field Username Uploader */}
            <input
              className="upload-input"
              placeholder="Username uploader (cth: zfirr)"
              value={form.uploaderUsername}
              onChange={e => setForm(f => ({ ...f, uploaderUsername: e.target.value }))}
            />

            {/* Baris platform sosial + username sosial uploader */}
            <div className="uploader-social-row">
              {/* Dropdown pilih platform sosial */}
              <div className="social-platform-wrap">
                <button
                  className="social-platform-btn"
                  onClick={() => setShowSocialDD(p => !p)}
                  type="button"
                >
                  {(() => {
                    const plat = SOCIAL_PLATFORMS.find(p => p.key === form.uploaderSocial.platform) || SOCIAL_PLATFORMS[0];
                    return (
                      <>
                        <i className={plat.icon} style={{ color: plat.color }} />
                        <span>{plat.key}</span>
                        <i className={`fas fa-chevron-${showSocialDD ? 'up' : 'down'}`} style={{ fontSize: 10 }} />
                      </>
                    );
                  })()}
                </button>
                {showSocialDD && (
                  <div className="social-platform-dropdown">
                    {SOCIAL_PLATFORMS.map(p => (
                      <button
                        key={p.key}
                        className={`social-plat-opt${form.uploaderSocial.platform === p.key ? ' sel' : ''}`}
                        onClick={() => {
                          setForm(f => ({ ...f, uploaderSocial: { ...f.uploaderSocial, platform: p.key } }));
                          setShowSocialDD(false);
                        }}
                        type="button"
                      >
                        <i className={p.icon} style={{ color: p.color }} />
                        <span>{p.key}</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>

              {/* Field username / handle sosial media uploader */}
              <input
                className="upload-input social-uname-input"
                placeholder="Username / handle"
                value={form.uploaderSocial.username}
                onChange={e => setForm(f => ({ ...f, uploaderSocial: { ...f.uploaderSocial, username: e.target.value } }))}
              />
            </div>

            {/* Tombol submit upload konten */}
            <button className="upload-submit-btn" onClick={handleSubmit}>
              <i className="fas fa-plus" /> Tambahkan Konten
            </button>
          </div>
        </div>
      );
    }

    // ============================================================
    //  ROOT APP
    //  Komponen utama: routing antar layar berdasarkan activeTab
    // ============================================================

    function App() {
      const { currentUser, activeTab, popup } = useApp();

      // Tampilkan login jika belum ada user yang masuk
      if (!currentUser) return <LoginScreen />;

      // Peta tab ke komponen layar
      const screens = {
        home    : <HomeScreen />,
        notif   : <NotificationsScreen />,
        profile : <ProfileScreen />,
        wishlist: <WishlistScreen />,
        upload  : <UploadScreen />,
      };

      return (
        <div className="app">
          {/* Area konten yang bisa di-scroll */}
          <div className="page-content">
            {screens[activeTab] || screens.home}
          </div>

          {/* Popup detail konten (jika ada) */}
          {popup && <ContentPopup />}

          {/* Navigasi bawah */}
          <BottomNav />
        </div>
      );
    }

    // ============================================================
    //  MOUNT
    //  Render aplikasi React ke dalam #root
    // ============================================================

    const rootEl = document.getElementById('root');
    ReactDOM.render(
      <AppProvider>
        <App />
      </AppProvider>,
      rootEl
    );
  </script>
</body>
</html>
